environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2
  connectivity_plus: ^5.0.2
